name: Prod CD

on:
  workflow_run:
    workflows:
      - Prod CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy To Compute Engine
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Pull and restart services on VM
        run: |
          gcloud compute ssh "${{ secrets.GCE_SSH_USER }}@${{ vars.GCE_VM_NAME }}" \
            --zone "${{ vars.GCE_VM_ZONE }}" \
            --command "cd '${{ vars.GCE_APP_DIR }}' && docker compose --env-file .env.prod -f docker-compose.prod.yml pull && docker compose --env-file .env.prod -f docker-compose.prod.yml up -d && docker image prune -f"
